---
- name: Linux Patch
  hosts: linux_servers
  become: yes

  tasks:

    - name: Patch RHEL/CentOS
      yum:
        name: '*'
        state: latest
      when: ansible_os_family == "RedHat"

    - name: Patch Ubuntu/Debian
      apt:
        update_cache: yes
        upgrade: dist
      when: ansible_os_family == "Debian"
