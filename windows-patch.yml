---
- name: Windows Patch Installation with Controlled Reboot
  hosts: all
  gather_facts: yes

  tasks:

    - name: Install Windows Updates
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
          - UpdateRollups
        reboot: no
        state: installed
      register: update_result

    - name: Get current hour from Windows server
      ansible.windows.win_shell: |
        (Get-Date).Hour
      register: current_hour

    - name: Reboot only during maintenance window
      ansible.windows.win_reboot:
        reboot_timeout: 3600
      when:
        - update_result.reboot_required
        - current_hour.stdout | int >= 1
        - current_hour.stdout | int < 2

    - name: Show update result
      debug:
        var: update_result
