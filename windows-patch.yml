---
- name: Windows Patch Installation
  hosts: all
  gather_facts: yes

  tasks:

    - name: Install Windows Security Updates
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
          - UpdateRollups
        reboot: yes
        reboot_timeout: 3600
        state: installed
      register: update_result

    - name: Show installed updates
      debug:
        var: update_result
